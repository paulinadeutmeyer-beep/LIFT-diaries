  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #080808;
    color: #f0ebe2;
    font-family: 'EaseDisplay', sans-serif;

  #track {
    position: absolute;
    left: 0;
    width: 100%;
    will-change: transform;
    visibility: hidden; /* hide until scaled */

  .line {
    display: block;
    width: 100%;
    white-space: nowrap;
    line-height: 1.02;

    z-index: 20; cursor: pointer;
    color: #444; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.22em;
    font-family: 'EaseDisplay', sans-serif;
    background: #080808;
  }

  function buildLine([heightVh, text]) {
    const div = document.createElement('div');
    div.className = 'line';
    // start with a reasonable px size based on vh target
    div.style.fontSize = (window.innerHeight * heightVh / 100 * 0.82) + 'px';
    div.dataset.heightVh = heightVh;

    text.split(' ').forEach((word, i, arr) => {
      const lower = word.toLowerCase().replace(/[^a-z]/g, '');
      if (alarmSet.has(lower)) {
        const sp = document.createElement('span');
        sp.className = 'aw';
        sp.textContent = word;
        div.appendChild(sp);
      } else {
        div.appendChild(document.createTextNode(word));
      }
      if (i < arr.length - 1) div.appendChild(document.createTextNode(' '));
    });
    return div;
  }

  function buildAll() {
    lines.forEach(l => track.appendChild(buildLine(l)));
  }
  buildAll();
  buildAll();

  function fitLines() {
    const vw = window.innerWidth;
    track.querySelectorAll('.line').forEach(div => {
      // binary search for the right font size
      let lo = 4, hi = window.innerHeight * 0.25;
      for (let i = 0; i < 20; i++) {
        const mid = (lo + hi) / 2;
        div.style.fontSize = mid + 'px';
        if (div.scrollWidth <= vw) lo = mid;
        else hi = mid;
      }
      div.style.fontSize = lo + 'px';
    });
    track.style.visibility = 'visible';
  }

  document.fonts.ready.then(() => {
    setTimeout(fitLines, 50);
  });

  // ── AUDIO ──
  let audioCtx = null, alarmBuffer = null;

  function b64ToArrayBuffer(b64) {
    const bin = atob(b64);
    const buf = new ArrayBuffer(bin.length);
    const v = new Uint8Array(buf);
    for (let i = 0; i < bin.length; i++) v[i] = bin.charCodeAt(i);
    return buf;
  }

  async function initAudio() {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      alarmBuffer = await audioCtx.decodeAudioData(b64ToArrayBuffer(ALARM_B64));
    } catch(e) {}
  }

  function playAlarm() {
    if (!audioCtx || !alarmBuffer) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const offset = Math.random() * Math.max(0, alarmBuffer.duration - 1.2);
    const src = audioCtx.createBufferSource();
    src.buffer = alarmBuffer;
    const gain = audioCtx.createGain();
    gain.gain.value = 0.8;
    src.connect(gain);
    gain.connect(audioCtx.destination);
    src.start(0, offset, 1.0);
  }

  function attachHover() {
    document.querySelectorAll('.aw').forEach(el => {
      let cd = false;
      el.addEventListener('mouseenter', () => {
        if (cd) return;
        playAlarm();
        cd = true;
        setTimeout(() => cd = false, 1500);
      });
    });
  }

  // ── SEAMLESS SCROLL ──
  let posY = window.innerHeight;
  const speed = 1.8;
  let running = false;

  function animate() {
    if (!running) return;
    posY -= speed;
    const half = track.offsetHeight / 2;
    if (posY <= -half) posY += half;
    track.style.transform = 'translateY(' + posY + 'px)';
    requestAnimationFrame(animate);
  }

  document.getElementById('click-overlay').addEventListener('click', () => {
    document.getElementById('click-overlay').style.display = 'none';
    initAudio().then(attachHover);
    running = true;
    animate();
  });
</script>
</body>
</html>
